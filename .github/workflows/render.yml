name: Render results tables

# Regenerate the README tables from data/ whenever the data (or the renderer) changes.
# Pure data transform — no solver, no GPU, stdlib Python only.
on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "render.py"
      - ".github/workflows/render.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Render tables into README.md
        run: python3 render.py
      - name: Commit if README changed
        run: |
          if ! git diff --quiet README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "Auto-render results tables from data/"
            git push
          else
            echo "README.md already up to date."
          fi
